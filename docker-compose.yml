services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile.dev
    container_name: crescere-lia-back
    ports:
      - "3000:3000"
    volumes:
      - ./back/src:/app/src
    environment:
      PORT: 3000
    restart: unless-stopped

  front:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    container_name: crescere-lia-front
    ports:
      - "5173:5173"
    volumes:
      - ./front/src:/app/src
      - ./front/index.html:/app/index.html
      - ./front/public:/app/public
    environment:
      VITE_API_PROXY_TARGET: http://back:3000
    depends_on:
      - back
    restart: unless-stopped
