services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: crescere-lia-back
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_WHISPER_MODEL: ${OPENAI_WHISPER_MODEL:-whisper-1}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-1024}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-nova}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-crescere}
      DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-Crescere}
    volumes:
      - lia_back_data:/app/data
    expose:
      - "3000"
    networks:
      - lia

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_USE_AI_CHAT: "true"
    container_name: crescere-lia-front
    restart: unless-stopped
    depends_on:
      - back
    expose:
      - "80"
    networks:
      - lia

  caddy:
    image: caddy:2-alpine
    container_name: crescere-lia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Defina DOMAIN no arquivo .env.production}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - front
    networks:
      - lia

networks:
  lia:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  lia_back_data:
